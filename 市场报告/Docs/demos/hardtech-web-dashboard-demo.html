<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>硬科技全域日报 · Web 看板 Demo</title>
  <style>
    :root {
      --bg: #050b16;
      --card: rgba(12, 24, 48, 0.78);
      --line: rgba(143, 170, 212, 0.22);
      --text: #e8f0ff;
      --muted: #9db1d8;
      --accent: #6ee7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Space Grotesk", "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(900px 500px at -15% -20%, rgba(57, 194, 255, 0.16), transparent 60%),
        radial-gradient(900px 500px at 120% -10%, rgba(139, 147, 255, 0.18), transparent 56%),
        linear-gradient(180deg, #040914, #081224 36%, #050b16);
      min-height: 100vh;
      padding: 22px;
    }
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
      opacity: 0.18;
    }
    .wrap {
      max-width: 1260px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }
    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(120deg, rgba(13, 25, 52, 0.95), rgba(17, 38, 74, 0.85));
    }
    .title { margin: 0; font-size: clamp(22px, 2.9vw, 36px); }
    .subtitle { margin-top: 8px; color: var(--muted); font-size: 14px; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .badge {
      padding: 5px 10px;
      border: 1px solid rgba(157, 177, 216, 0.35);
      border-radius: 999px;
      font-size: 12px;
      color: #c9d8f6;
      background: rgba(255, 255, 255, 0.03);
    }
    .meta {
      min-width: 260px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      color: #d5e3ff;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.03);
    }
    .actions { margin-top: 10px; display: grid; gap: 8px; }
    .date-row { display: grid; gap: 6px; }
    .date-label { color: #b9c9e9; font-size: 12px; }
    .date-select {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(157, 177, 216, 0.45);
      background: rgba(9, 21, 43, 0.9);
      color: #dff0ff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
    }
    .date-select:focus {
      border-color: rgba(110, 231, 255, 0.7);
      box-shadow: 0 0 0 2px rgba(110, 231, 255, 0.15);
    }
    .export-btn {
      appearance: none;
      border: 1px solid rgba(110, 231, 255, 0.55);
      background: linear-gradient(120deg, rgba(56, 189, 248, 0.18), rgba(110, 231, 255, 0.12));
      color: #dff8ff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .export-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .export-tip { color: #9cd9ea; font-size: 12px; min-height: 16px; }
    .check-row { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #cbe0ff; }
    .check-row input { accent-color: #6ee7ff; }
    .grid { display: grid; gap: 16px; grid-template-columns: 1.2fr 1fr; }
    .pane { padding: 16px; }
    .section-head { margin: 0; font-size: 16px; font-weight: 700; }
    .breakthroughs { display: grid; gap: 10px; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 12px; }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
    }
    .kpi h3 { margin: 0; font-size: 13px; color: #ffe08a; }
    .kpi p { margin: 8px 0 0; font-size: 13px; line-height: 1.5; color: #d8e5ff; }
    .insight {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed rgba(110, 231, 255, 0.35);
      color: #bce9ff;
      line-height: 1.6;
      font-size: 14px;
    }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .pie {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      margin: 10px auto;
      position: relative;
      background: conic-gradient(#39c2ff 0 40%, #8b93ff 40% 65%, #42d392 65% 83%, #ffb347 83% 100%);
    }
    .pie::after {
      content: "赛道\A占比";
      white-space: pre;
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #09152b;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 14px;
      color: #deebff;
      text-align: center;
    }
    .legend { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .legend li { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #cfe0ff; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .heatmap {
      width: 100%;
      border-collapse: separate;
      border-spacing: 6px;
      margin-top: 6px;
      color: #e5eeff;
      font-size: 12px;
    }
    .heatmap th { color: #9eb4dd; font-weight: 600; }
    .heatmap td { text-align: center; padding: 10px 6px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.08); }
    .news-wrap { display: grid; gap: 10px; margin-top: 12px; max-height: 620px; overflow: auto; padding-right: 4px; }
    .news-infocard {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      display: grid;
      gap: 10px;
    }
    .info-title { font-size: 13px; color: #b9ccee; font-weight: 700; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-block {
      border: 1px solid rgba(143, 170, 212, 0.22);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
    }
    .insight-kpis { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .insight-kpi {
      border: 1px solid rgba(143, 170, 212, 0.24);
      border-radius: 10px;
      padding: 8px;
      background: rgba(9, 21, 43, 0.52);
    }
    .insight-kpi .k { font-size: 12px; color: #b9ccee; }
    .insight-kpi .v { font-size: 18px; color: #d9ecff; font-weight: 800; margin-top: 2px; }
    .trend-list { margin: 0; padding-left: 18px; display: grid; gap: 6px; color: #d6e7ff; font-size: 13px; }
    .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .io-card {
      border: 1px dashed rgba(143, 170, 212, 0.3);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.01);
      color: #cfe0ff;
      font-size: 12px;
      line-height: 1.6;
    }
    .io-card b { color: #e0efff; }
    .bar-row { display: grid; grid-template-columns: 56px 1fr 28px; gap: 8px; align-items: center; margin-top: 6px; }
    .bar-label { font-size: 12px; color: #c7d8f5; }
    .bar-track { height: 8px; border-radius: 999px; background: rgba(143, 170, 212, 0.18); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-value { font-size: 12px; color: #9cc4ff; text-align: right; }
    .keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .kw-chip {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #d5e7ff;
      border: 1px solid rgba(143, 170, 212, 0.28);
      background: rgba(9, 21, 43, 0.65);
    }
    .news-item { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: rgba(255, 255, 255, 0.02); }
    .meta-line { color: #8fa8d5; font-size: 12px; margin-bottom: 6px; }
    .headline { margin: 0; font-weight: 700; font-size: 14px; line-height: 1.5; }
    .sum { margin: 8px 0; color: #d7e5ff; font-size: 13px; line-height: 1.6; }
    .news-quote {
      margin: 8px 0;
      padding: 8px 10px;
      border-left: 3px solid rgba(110, 231, 255, 0.65);
      border-radius: 8px;
      background: rgba(110, 231, 255, 0.06);
      color: #d2e8ff;
      font-size: 12px;
      line-height: 1.65;
    }
    .news-quote b { color: #e7f4ff; }
    .news-item a { color: var(--accent); text-decoration: none; font-size: 12px; }
    .copy-block { padding: 16px; line-height: 1.8; }
    .copy-title { font-size: 20px; margin: 0 0 10px; }
    .copy-open { color: #d8e8ff; margin: 0 0 10px; }
    .tagline { margin-top: 10px; color: #88f0ff; font-size: 14px; }
    .source-links {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed rgba(143, 170, 212, 0.35);
      background: rgba(255, 255, 255, 0.02);
      font-size: 12px;
      line-height: 1.7;
      color: #bcd2f5;
      word-break: break-all;
    }
    .source-links b { color: #d7e8ff; }
    .source-links.hidden { display: none; }
    @media (max-width: 980px) {
      .grid, .breakthroughs, .split { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .news-wrap { max-height: none; }
    }
  </style>
</head>

        <div class="tagline">#AI #芯片 #硬科技 #科技早报 #机器人 #新能源车</div>

          ]
        }
      }
    };

    const metaTimeEl = document.getElementById('metaTime');
    const dateSelectEl = document.getElementById('dateSelect');
    const breakthroughsEl = document.getElementById('breakthroughs');
    const legendEl = document.getElementById('legend');
    const heatmapEl = document.getElementById('heatmap');
    const newsListEl = document.getElementById('newsList');
    const newsInfographicEl = document.getElementById('newsInfographic');
    const copyTitleEl = document.getElementById('copyTitle');
    const copyOpenEl = document.getElementById('copyOpen');
    const copyInsightsEl = document.getElementById('copyInsights');
    const copySourcesEl = document.getElementById('copySources');
    const pieEl = document.querySelector('.pie');
    const exportBtn = document.getElementById('exportBtn');
    const exportTip = document.getElementById('exportTip');
    const includeLinksExportEl = document.getElementById('includeLinksExport');

    let currentDateKey = '';
    let currentData = null;

    const toHeatColor = (score) => `rgba(66, 211, 146, ${(0.25 + score / 14).toFixed(2)})`;
    const topN = (obj, n) => Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n);
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const extractQuote = (text) => {
      const cleaned = (text || '').trim();
      if (!cleaned) return '暂无可提炼摘录';
      const parts = cleaned.split(/[。！？!?；;]/).map((s) => s.trim()).filter(Boolean);
      if (!parts.length) return cleaned;
      let picked = '';
      for (let i = 0; i < parts.length; i += 1) {
        picked += (picked ? '。' : '') + parts[i];
        if (picked.length >= 50) break;
      }
      return picked.length >= 50 ? `${picked}。` : cleaned;
    };

    const themeRules = [
      { key: '技术演进', keys: ['语音', '大模型', '模型', '算力', '芯片', '6G', '推理', '标准', '机器人', '智驾'] },
      { key: '商业化落地', keys: ['发布', '上线', '交付', '应用', '生态', '补能', '快充', '用户', '场景'] },
      { key: '治理与风险', keys: ['治理', '条款', '争议', '合规', '风险', '政策', '国防', '供应链', '边界'] }
    ];

    const buildInfographicStats = (news) => {
      const themeCount = { '技术演进': 0, '商业化落地': 0, '治理与风险': 0 };
      const keywordCounts = {};
      const focusWords = ['语音', '算力', '6G', '标准化', '快充', '智驾', '治理', '合规', '组织稳定', '端侧'];
      const textAll = news.map((n) => `${n.title} ${n.summary}`).join('。');

      news.forEach((n) => {
        const text = `${n.title} ${n.summary}`;
        themeRules.forEach((rule) => {
          if (rule.keys.some((k) => text.includes(k))) themeCount[rule.key] += 1;
        });
        focusWords.forEach((w) => {
          if (text.includes(w)) keywordCounts[w] = (keywordCounts[w] || 0) + 1;
        });
      });

      const trendPower = clamp(Math.round((themeCount['技术演进'] / news.length) * 100), 40, 95);
      const commercialization = clamp(Math.round((themeCount['商业化落地'] / news.length) * 100), 35, 92);
      const riskLevel = clamp(Math.round((themeCount['治理与风险'] / news.length) * 100), 20, 88);

      const trendTop = topN(themeCount, 3).map(([name, val]) => ({
        name,
        val,
        pct: Math.round((val / news.length) * 100)
      }));
      const hotWords = topN(keywordCounts, 6).map(([k, v]) => `${k}×${v}`);

      const opportunities = [];
      if (textAll.includes('语音') || textAll.includes('大模型')) opportunities.push('多模态交互工具（语音+代码）');
      if (textAll.includes('6G') || textAll.includes('算力')) opportunities.push('端云协同与网络算力基础设施');
      if (textAll.includes('快充') || textAll.includes('补能')) opportunities.push('补能网络与车端服务生态');
      if (textAll.includes('标准') || textAll.includes('机器人')) opportunities.push('机器人标准适配与平台型方案');

      const risks = [];
      if (textAll.includes('治理') || textAll.includes('合规') || textAll.includes('条款')) risks.push('政策与合规不确定性');
      if (textAll.includes('组织') || textAll.includes('离任')) risks.push('核心团队变动导致的路线波动');
      if (textAll.includes('供应链') || textAll.includes('风险')) risks.push('供应链与地缘风险外溢');

      const watchlist = [
        '模型能力是否继续向交互体验迁移',
        '6G/边缘算力项目是否出现规模化试点',
        '快充与智驾能力是否转化为用户感知',
        '机器人标准是否落到商用交付指标'
      ];

      return {
        trendPower,
        commercialization,
        riskLevel,
        trendTop,
        hotWords,
        opportunities: opportunities.slice(0, 3),
        risks: risks.slice(0, 3),
        watchlist: watchlist.slice(0, 3)
      };
    };

    const renderNewsInfographic = (news) => {
      const stats = buildInfographicStats(news);
      const trendHtml = stats.trendTop.map((x) => `<li>${x.name}：覆盖 ${x.pct}%（${x.val}/10）</li>`).join('');
      const kwHtml = stats.hotWords.map((x) => `<span class="kw-chip">${x}</span>`).join('');

      newsInfographicEl.innerHTML = `
        <div class="info-title">内容洞察信息图（基于当日 10 条新闻自动分析）</div>
        <div class="insight-kpis">
          <div class="insight-kpi"><div class="k">趋势强度</div><div class="v">${stats.trendPower}</div></div>
          <div class="insight-kpi"><div class="k">商业落地温度</div><div class="v">${stats.commercialization}</div></div>
          <div class="insight-kpi"><div class="k">风险关注度</div><div class="v">${stats.riskLevel}</div></div>
        </div>
        <div class="info-grid">
          <div class="info-block">
            <div class="info-title">三大趋势主题</div>
            <ol class="trend-list">${trendHtml}</ol>
          </div>
          <div class="info-block">
            <div class="info-title">关键词热度</div>
            <div class="keywords">${kwHtml}</div>
          </div>
        </div>
        <div class="io-grid">
          <div class="io-card"><b>机会点</b><br>${stats.opportunities.join('<br>')}</div>
          <div class="io-card"><b>风险点</b><br>${stats.risks.join('<br>')}</div>
          <div class="io-card" style="grid-column: 1 / -1;"><b>明日观察</b><br>${stats.watchlist.join('<br>')}</div>
        </div>
      `;
    };

    const buildPieGradient = (sectors) => {
      let start = 0;
      const stops = sectors.map((s) => {
        const end = start + s.ratio;
        const seg = `${s.color} ${start}% ${end}%`;
        start = end;
        return seg;
      });
      return `conic-gradient(${stops.join(', ')})`;
    };

    const renderBoard = (dateKey) => {
      currentDateKey = dateKey;
      currentData = boardArchive[dateKey];

      metaTimeEl.textContent = `更新时间：${currentData.updatedAt}`;
      pieEl.style.background = buildPieGradient(currentData.sectors);

      breakthroughsEl.innerHTML = currentData.breakthroughs.map((item) => `
        <article class="kpi">
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </article>
      `).join('');

      legendEl.innerHTML = currentData.sectors.map((item) => `
        <li>
          <span><i class="dot" style="background:${item.color}"></i>${item.name}</span>
          <strong>${item.ratio}%</strong>
        </li>
      `).join('');

      const headRow = `<tr><th></th>${currentData.heatmap.cols.map((c) => `<th>${c}</th>`).join('')}</tr>`;
      const rows = currentData.heatmap.rows.map((r) => `
        <tr>
          <th>${r.name}</th>
          ${r.scores.map((s) => `<td style="background:${toHeatColor(s)}">${s}</td>`).join('')}
        </tr>
      `).join('');
      heatmapEl.innerHTML = headRow + rows;

      newsListEl.innerHTML = currentData.news.map((n, idx) => `
        <article class="news-item">
          <div class="meta-line">${String(idx + 1).padStart(2, '0')} · ${n.tag}</div>
          <h3 class="headline">${n.title}</h3>
          <div class="news-quote"><b>摘录：</b>${n.quote || extractQuote(n.summary)}</div>
          <p class="sum">${n.summary}</p>
          <a href="${n.link}" target="_blank" rel="noopener noreferrer">来源：${n.source}</a>
        </article>
      `).join('');
      renderNewsInfographic(currentData.news);

      copyTitleEl.textContent = currentData.copy.title;
      copyOpenEl.textContent = currentData.copy.open;
      copyInsightsEl.innerHTML = currentData.copy.insights.map((line) => `<div>${line}</div>`).join('');
      copySourcesEl.classList.add('hidden');
      copySourcesEl.innerHTML = `<b>原文链接（前5条）</b><br>${currentData.news.slice(0, 5).map((n, i) => `${i + 1}. ${n.source}：<a href=\"${n.link}\" target=\"_blank\" rel=\"noopener noreferrer\">${n.link}</a>`).join('<br>')}`;
      exportTip.textContent = '';
    };

    const initDateFilter = () => {
      const dates = Object.keys(boardArchive).sort((a, b) => b.localeCompare(a));
      dateSelectEl.innerHTML = dates.map((d) => `<option value="${d}">${d}</option>`).join('');
      dateSelectEl.value = dates[0];
      renderBoard(dates[0]);
      dateSelectEl.addEventListener('change', (e) => renderBoard(e.target.value));
    };

    const waitForNextFrame = () => new Promise((resolve) => requestAnimationFrame(() => resolve()));

    const downloadCanvas = (canvas) => {
      const link = document.createElement('a');
      link.download = `hardtech-dashboard-${currentDateKey}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    const roundRect = (ctx, x, y, w, h, r) => {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    };

    const drawTextBlock = (ctx, text, x, y, maxWidth, lineHeight, maxLines) => {
      const chars = Array.from(text);
      const lines = [];
      let line = '';
      for (let i = 0; i < chars.length; i += 1) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = chars[i];
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      const limited = typeof maxLines === 'number' ? lines.slice(0, maxLines) : lines;
      limited.forEach((l, idx) => ctx.fillText(l, x, y + idx * lineHeight));
      return y + limited.length * lineHeight;
    };

    const exportFallbackCanvas = (includeLinks) => {
      const width = 1240;
      const height = 2200;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const bg = ctx.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, '#040914');
      bg.addColorStop(1, '#050b16');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = '#0b1730';
      roundRect(ctx, 40, 40, width - 80, 170, 20);
      ctx.fill();
      ctx.strokeStyle = 'rgba(143,170,212,0.28)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#e8f0ff';
      ctx.font = 'bold 44px sans-serif';
      ctx.fillText('硬科技全域日报 · 小红书看板', 70, 102);
      ctx.fillStyle = '#a6bbde';
      ctx.font = '24px sans-serif';
      ctx.fillText('AI / 芯片 / 机器人 / 新能源汽车科技', 70, 145);
      ctx.font = '20px sans-serif';
      ctx.fillText(`更新时间：${currentData.updatedAt}`, 70, 178);

      ctx.fillStyle = '#0d1f3f';
      roundRect(ctx, 40, 240, width - 80, 300, 18);
      ctx.fill();
      ctx.fillStyle = '#e8f0ff';
      ctx.font = 'bold 30px sans-serif';
      ctx.fillText('今日 3 大突破点', 70, 285);

      let x = 70;
      currentData.breakthroughs.forEach((item) => {
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        roundRect(ctx, x, 310, 360, 200, 12);
        ctx.fill();
        ctx.fillStyle = '#ffe08a';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText(item.title, x + 18, 350);
        ctx.fillStyle = '#d8e5ff';
        ctx.font = '20px sans-serif';
        drawTextBlock(ctx, item.text, x + 18, 390, 320, 30, 3);
        x += 380;
      });

      ctx.fillStyle = '#0d1f3f';
      roundRect(ctx, 40, 570, width - 80, 380, 18);
      ctx.fill();
      ctx.fillStyle = '#e8f0ff';
      ctx.font = 'bold 30px sans-serif';
      ctx.fillText('赛道热度与趋势分布', 70, 615);

      const cx = 230;
      const cy = 770;
      const r = 120;
      let start = -Math.PI / 2;
      currentData.sectors.forEach((s) => {
        const end = start + (Math.PI * 2 * s.ratio / 100);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = s.color;
        ctx.fill();
        start = end;
      });
      ctx.fillStyle = '#09152b';
      ctx.beginPath();
      ctx.arc(cx, cy, 62, 0, Math.PI * 2);
      ctx.fill();

      currentData.sectors.forEach((s, i) => {
        const ly = 690 + i * 48;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(390, ly, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#cfe0ff';
        ctx.font = '22px sans-serif';
        ctx.fillText(`${s.name} ${s.ratio}%`, 410, ly + 7);
      });

      const hmX = 650;
      const hmY = 670;
      const cw = 150;
      const ch = 62;
      ctx.fillStyle = '#9eb4dd';
      ctx.font = '20px sans-serif';
      currentData.heatmap.cols.forEach((c, i) => ctx.fillText(c, hmX + 112 + i * cw, hmY));
      currentData.heatmap.rows.forEach((row, rIdx) => {
        ctx.fillStyle = '#9eb4dd';
        ctx.fillText(row.name, hmX, hmY + 58 + rIdx * ch);
        row.scores.forEach((score, cIdx) => {
          ctx.fillStyle = `rgba(66, 211, 146, ${(0.25 + score / 14).toFixed(2)})`;
          roundRect(ctx, hmX + 90 + cIdx * cw, hmY + 24 + rIdx * ch, 132, 46, 8);
          ctx.fill();
          ctx.fillStyle = '#0b1730';
          ctx.font = 'bold 20px sans-serif';
          ctx.fillText(String(score), hmX + 148 + cIdx * cw, hmY + 55 + rIdx * ch);
        });
      });

      ctx.fillStyle = '#0d1f3f';
      roundRect(ctx, 40, 980, width - 80, 1180, 18);
      ctx.fill();
      ctx.fillStyle = '#e8f0ff';
      ctx.font = 'bold 30px sans-serif';
      ctx.fillText('10 条精选新闻 + 小红书文案', 70, 1030);

      ctx.strokeStyle = 'rgba(143,170,212,0.18)';
      ctx.beginPath();
      ctx.moveTo(740, 1048);
      ctx.lineTo(740, 2120);
      ctx.stroke();

      const info = buildInfographicStats(currentData.news);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      roundRect(ctx, 60, 1060, 650, 240, 12);
      ctx.fill();
      ctx.fillStyle = '#b9ccee';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('内容洞察信息图（当日10条自动分析）', 80, 1095);
      ctx.fillStyle = '#d7e8ff';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(`趋势强度 ${info.trendPower}`, 80, 1132);
      ctx.fillText(`商业落地温度 ${info.commercialization}`, 280, 1132);
      ctx.fillText(`风险关注度 ${info.riskLevel}`, 520, 1132);

      ctx.fillStyle = '#cfe0ff';
      ctx.font = '16px sans-serif';
      info.trendTop.slice(0, 3).forEach((x, i) => {
        ctx.fillText(`${i + 1}. ${x.name} 覆盖 ${x.pct}%`, 80, 1165 + i * 30);
      });

      ctx.fillStyle = '#9cc4ff';
      ctx.font = '15px sans-serif';
      const kwLine = `热词：${info.hotWords.slice(0, 5).join(' / ')}`;
      drawTextBlock(ctx, kwLine, 80, 1260, 610, 22, 2);

      let y = 1330;
      currentData.news.slice(0, 6).forEach((n, i) => {
        ctx.fillStyle = '#9ab1d9';
        ctx.font = '18px sans-serif';
        ctx.fillText(`${String(i + 1).padStart(2, '0')} · ${n.tag}`, 70, y);
        ctx.fillStyle = '#dbe8ff';
        ctx.font = 'bold 19px sans-serif';
        y = drawTextBlock(ctx, n.title, 70, y + 30, 630, 28, 2);
        ctx.fillStyle = '#b9cdef';
        ctx.font = '17px sans-serif';
        y = drawTextBlock(ctx, n.summary, 70, y + 6, 630, 25, 3);
        y += 14;
      });

      let cy2 = 1080;
      ctx.fillStyle = '#7fe4ff';
      ctx.font = 'bold 22px sans-serif';
      cy2 = drawTextBlock(ctx, currentData.copy.title, 770, cy2, 420, 32, 3) + 8;
      ctx.fillStyle = '#d6e6ff';
      ctx.font = '18px sans-serif';
      cy2 = drawTextBlock(ctx, currentData.copy.open, 770, cy2, 420, 27, 6) + 10;
      currentData.copy.insights.forEach((line) => {
        cy2 = drawTextBlock(ctx, line, 770, cy2, 420, 27, 3) + 6;
      });
      ctx.fillStyle = '#88f0ff';
      drawTextBlock(ctx, '#AI #芯片 #硬科技 #科技早报 #机器人 #新能源车', 770, 2060, 420, 27, 2);
      if (includeLinks) {
        ctx.fillStyle = '#9cc4ff';
        ctx.font = '16px sans-serif';
        let ly = 1890;
        drawTextBlock(ctx, '原文链接（前5条）', 770, ly, 420, 24, 1);
        ly += 28;
        currentData.news.slice(0, 5).forEach((n, i) => {
          const short = n.link.length > 54 ? `${n.link.slice(0, 54)}...` : n.link;
          ly = drawTextBlock(ctx, `${i + 1}. ${n.source} ${short}`, 770, ly, 420, 22, 2) + 4;
        });
      }

      downloadCanvas(canvas);
    };

    const exportBoardAsPng = async () => {
      exportBtn.disabled = true;
      exportTip.textContent = '正在生成长图...';
      await waitForNextFrame();
      const shouldShowLinks = !!includeLinksExportEl.checked;
      if (shouldShowLinks) {
        copySourcesEl.classList.remove('hidden');
        await waitForNextFrame();
      }

      const target = document.querySelector('.wrap');
      const rect = target.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const styleText = Array.from(document.querySelectorAll('style')).map((s) => s.textContent).join('\n');
      const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml"><style>${styleText}</style>${target.outerHTML}</div>
  </foreignObject>
</svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      try {
        const img = await new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = url;
        });
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        const canvas = document.createElement('canvas');
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.scale(ratio, ratio);
        ctx.fillStyle = '#050b16';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        downloadCanvas(canvas);
        exportTip.textContent = '导出成功，PNG 已开始下载。';
      } catch (err) {
        try {
          exportFallbackCanvas(shouldShowLinks);
          exportTip.textContent = '已切换兼容模式导出成功（Canvas 重绘）。';
        } catch (fallbackErr) {
          exportTip.textContent = '导出失败：请刷新页面后重试。';
        }
      } finally {
        if (shouldShowLinks) copySourcesEl.classList.add('hidden');
        URL.revokeObjectURL(url);
        exportBtn.disabled = false;
      }
    };

    exportBtn.addEventListener('click', exportBoardAsPng);
    initDateFilter();
  </script>
</body>
</html>
