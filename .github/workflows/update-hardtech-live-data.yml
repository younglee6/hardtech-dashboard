name: Update Hardtech Live Data

on:
  schedule:
    # 08:00 Asia/Shanghai = 00:00 UTC
    - cron: '0 0 * * *'
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate archive JSON from whitelisted sites
        env:
          TZ: Asia/Shanghai
        run: |
          REPORT_DATE=$(date +%F)
          python3 "LYtests/Docs/demos/scripts/generate_live_data_from_whitelist.py" \
            --out "LYtests/Docs/demos/hardtech-live-data.json" \
            --date "$REPORT_DATE" \
            --limit 10 \
            --backfill-days 5 \
            --archive-days 7
          cp "LYtests/Docs/demos/hardtech-live-data.json" "LYtests/Docs/demos/site/hardtech-live-data.json"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- "LYtests/Docs/demos/hardtech-live-data.json" "LYtests/Docs/demos/site/hardtech-live-data.json"; then
            echo "No changes in JSON."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "LYtests/Docs/demos/hardtech-live-data.json" "LYtests/Docs/demos/site/hardtech-live-data.json"
          git commit -m "chore: update hardtech live data"
          git push
